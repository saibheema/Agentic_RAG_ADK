name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via Workload Identity
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Build container image via Cloud Build
        run: |
          gcloud builds submit \
            --tag gcr.io/unicon-494419/agentic-rag-adk:latest \
            --project=unicon-494419 \
            --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agentic-rag-chat \
            --image gcr.io/unicon-494419/agentic-rag-adk:latest \
            --project=unicon-494419 \
            --region=us-central1 \
            --quiet

      - name: Print deployment URL
        run: echo "✅ Deployed → https://agentic-rag-chat-6slvib5z6a-uc.a.run.app/app/"
